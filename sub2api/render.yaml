services:
  - type: web
    name: cli-proxy-api
    runtime: image
    image:
      url: docker.io/eceasy/cli-proxy-api:latest
    plan: starter
    envVars:
      - key: TZ
        value: Asia/Shanghai
    disks:
      - name: cpa-config
        mountPath: /CLIProxyAPI
        sizeGB: 1
      - name: cpa-auths
        mountPath: /root/.cli-proxy-api
        sizeGB: 1
  - type: web
    name: cpa-usage-keeper
    runtime: image
    image:
      url: ghcr.io/willxup/cpa-usage-keeper:latest
    plan: starter
    envVars:
      - key: TZ
        value: Asia/Shanghai
      - key: CPA_BASE_URL
        fromService:
          type: web
          name: cli-proxy-api
          property: hostport
      - key: CPA_MANAGEMENT_KEY
        value: replace-with-your-management-key
      - key: REDIS_QUEUE_ADDR
        fromService:
          type: web
          name: cli-proxy-api
          property: hostport
      - key: AUTH_ENABLED
        value: "true"
      - key: LOGIN_PASSWORD
        value: replace-with-your-login-password
    disks:
      - name: keeper-data
        mountPath: /data
        sizeGB: 1
